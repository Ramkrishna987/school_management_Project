{% extends 'common/base.html' %}
{% block title %}{{ code }} — {{ message }}{% endblock %}

{% block content %}
<div class="d-flex flex-column align-items-center justify-content-center text-center py-5" style="min-height: 60vh;">
  <div class="mb-4">
    {% if code == 404 %}
      <i class="bi bi-search text-primary" style="font-size: 5rem; opacity: 0.3;"></i>
    {% elif code == 403 %}
      <i class="bi bi-shield-lock text-warning" style="font-size: 5rem; opacity: 0.3;"></i>
    {% elif code == 500 %}
      <i class="bi bi-exclamation-triangle text-danger" style="font-size: 5rem; opacity: 0.3;"></i>
    {% else %}
      <i class="bi bi-x-circle text-secondary" style="font-size: 5rem; opacity: 0.3;"></i>
    {% endif %}
  </div>
  <h1 class="display-1 fw-bold text-muted" style="opacity: 0.2;">{{ code }}</h1>
  <h3 class="fw-bold mb-2">{{ message }}</h3>
  <p class="text-muted mb-4" style="max-width: 400px;">{{ detail }}</p>
  <div class="d-flex gap-3">
    <a href="javascript:history.back()" class="btn btn-outline-secondary">
      <i class="bi bi-arrow-left me-2"></i>Go Back
    </a>
    <a href="{{ url_for('common.dashboard') }}" class="btn btn-primary">
      <i class="bi bi-house me-2"></i>Dashboard
    </a>
  </div>
</div>
{% endblock %}
